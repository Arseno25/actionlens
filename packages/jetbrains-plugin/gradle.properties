# Plugin coordinates
pluginGroup = com.actionlens
pluginName = ActionLens
pluginVersion = 1.0.11
pluginSinceBuild = 241
pluginUntilBuild = 262.*

# IntelliJ Platform — base IDE used for development. Plugin targets any
# version from sinceBuild to untilBuild (inclusive), but compiles against this.
platformType = IC
platformVersion = 2024.1

# Do not bundle Kotlin stdlib as it is already provided by IntelliJ Platform
kotlin.stdlib.default.dependency=false

# Kotlin / JVM
kotlin.code.style = official
org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8
